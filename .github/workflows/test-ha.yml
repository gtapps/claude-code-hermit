name: Test HA Hermit

on:
  push:
    branches: [main]
    paths:
      - 'plugins/claude-code-homeassistant-hermit/**'
      - '.github/workflows/test-ha.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
  pull_request:
    paths:
      - 'plugins/claude-code-homeassistant-hermit/**'
      - '.github/workflows/test-ha.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # tests/gate-corpus.test.ts materializes the retired Python gates
          # from git history (42c0c8f~1) for side-by-side equivalence runs.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      # Python here is a TEST FIXTURE only (nothing shipped runs it): the
      # golden-corpus test replays the retired Python hooks against the TS
      # ports, and yaml-parity.test.ts compares against PyYAML.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml python-dotenv
      - run: bun install --frozen-lockfile
      - run: bunx tsc
      - run: bun test
        working-directory: plugins/claude-code-homeassistant-hermit
