name: Test Hooks

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: bash tests/run-hooks.sh
