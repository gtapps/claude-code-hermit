name: Test Hooks

on:
  push:
    branches: [main]
    paths:
      - 'plugins/claude-code-hermit/**'
      - '.claude/skills/simplify/**'
      # Cross-plugin invariants in hooks.contract.test.ts walk every plugin's
      # manifest and the marketplace, so those paths must trigger this suite too.
      - 'plugins/*/.claude-plugin/**'
      # operator-doc-refs.test.ts walks every plugin's state-templates for bare
      # docs/ refs, so a sibling plugin's state-template edit must run this suite.
      - 'plugins/*/state-templates/**'
      - '.claude-plugin/marketplace.json'
      - '.github/workflows/test-hooks.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
  pull_request:
    paths:
      - 'plugins/claude-code-hermit/**'
      - '.claude/skills/simplify/**'
      # Cross-plugin invariants in hooks.contract.test.ts walk every plugin's
      # manifest and the marketplace, so those paths must trigger this suite too.
      - 'plugins/*/.claude-plugin/**'
      # operator-doc-refs.test.ts walks every plugin's state-templates for bare
      # docs/ refs, so a sibling plugin's state-template edit must run this suite.
      - 'plugins/*/state-templates/**'
      - '.claude-plugin/marketplace.json'
      - '.github/workflows/test-hooks.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: bun install --frozen-lockfile
      # No-op until the first .ts lands; tsc exits 18003 on zero inputs, so gate on file presence.
      - run: |
          if [ -n "$(find plugins -name '*.ts' -print -quit)" ]; then
            bunx tsc
          else
            echo "no .ts files yet — skipping typecheck"
          fi
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      # The repo-internal /simplify mirror must stay byte-identical to the shipped skill.
      - name: Guard .claude/skills/simplify mirror
        run: diff -r .claude/skills/simplify plugins/claude-code-hermit/skills/simplify
      - run: bun test
        working-directory: plugins/claude-code-hermit
