name: Test Hooks

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'
      - 'state-templates/**'
  pull_request:
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'
      - 'state-templates/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: bash tests/run-hooks.sh
      - run: python3 tests/run-contracts.py
