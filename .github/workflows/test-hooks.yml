name: Test Hooks

on:
  push:
    branches: [main]
    paths:
      - 'plugins/claude-code-hermit/**'
      - '.github/workflows/test-hooks.yml'
  pull_request:
    paths:
      - 'plugins/claude-code-hermit/**'
      - '.github/workflows/test-hooks.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: bash tests/run-hooks.sh
        working-directory: plugins/claude-code-hermit
      - run: python3 tests/run-contracts.py
        working-directory: plugins/claude-code-hermit
