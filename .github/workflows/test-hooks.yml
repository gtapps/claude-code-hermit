name: Test Hooks

on:
  push:
    branches: [main]
    paths:
      - 'plugins/claude-code-hermit/**'
      - '.github/workflows/test-hooks.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
  pull_request:
    paths:
      - 'plugins/claude-code-hermit/**'
      - '.github/workflows/test-hooks.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: bun install --frozen-lockfile
      # No-op until the first .ts lands; tsc exits 18003 on zero inputs, so gate on file presence.
      - run: |
          if [ -n "$(find plugins -name '*.ts' -print -quit)" ]; then
            bunx tsc
          else
            echo "no .ts files yet — skipping typecheck"
          fi
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: bash tests/run-hooks.sh
        working-directory: plugins/claude-code-hermit
      - run: python3 tests/run-contracts.py
        working-directory: plugins/claude-code-hermit
