name: Test Feed Hermit

on:
  push:
    branches: [main]
    paths:
      - 'plugins/feed-hermit/**'
      - '.github/workflows/test-feed.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
  pull_request:
    paths:
      - 'plugins/feed-hermit/**'
      - '.github/workflows/test-feed.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - run: bunx tsc

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/feed-hermit
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Run test suite
        run: bun test
