name: Clone stats
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: clone-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          ref: _stats_badges
          path: badges-data
      - name: Update clone history + badge
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPO: ${{ github.repository }}
          BADGES_DIR: ${{ github.workspace }}/badges-data/.github/badges
        run: node .github/scripts/update-clones.mjs
      - name: Commit if changed
        working-directory: badges-data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges
          git diff --cached --quiet || (git commit -m "update clone stats" && git pull --rebase && git push)
